name: API Deployment

on:
  push: 
    branches:
      - main

jobs:
    prepare-application:
      runs-on: ubuntu-latest
      container: 
        image: node:22
      steps:
        - uses: actions/checkout@v3
          with:
            node-version: 22
        - run: cd ./mes-api
        - run: npm i
        - run: npm run build
