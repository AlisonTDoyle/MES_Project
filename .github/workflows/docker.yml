name: Deploy to AWS

on:
  push:
    branches: [main]

env: 
  AWS_REGION: eu-west-1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with: 
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          aws-region: ${{env.AWS_REGION}}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push api to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./mes-api
          push: true
          tags: |
            ${{steps.login-ecr.outputs.registry}}/mes-api:${{github.sha}}
            ${{steps.login-ecr.outputs.registry}}/mes-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USER}}
          key: ${{secrets.EC2_SSH_KEY}}
          script: |
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin \
              ${{ steps.login-ecr.outputs.registry }}

            docker pull ${{ steps.login-ecr.outputs.registry }}/mes-api:${{ github.sha }}

            docker stop mes-api || true
            docker rm mes-api || true

            echo "${{ secrets.PROD_ENV_FILE }}" > /home/ubuntu/api/.env

            docker run -d \
              --name mes-api \
              --restart always \
              -p 443:3001 \
              --env-file /home/ubuntu/api/.env \
              ${{ steps.login-ecr.outputs.registry }}/mes-api:${{ github.sha }}

            docker image prune -f